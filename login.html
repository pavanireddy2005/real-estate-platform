<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dream Homes</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>

    <nav class="navbar">

        <div class="logo">
            <img src="assets/images/logo.png" alt="Dream Homes Logo">
        </div>

        <ul class="nav-links">

            <li>
                <a href="index.html">Home</a>
            </li>

            <li>
                <a href="properties.html">Properties</a>
            </li>

            <li>
                <a href="contact.html">Contact</a>
            </li>

            <li>
                <button id="dark-mode-btn">
                    🌙
                </button>
            </li>

        </ul>

    </nav>

</header>

<div class="auth-container">

    <form
        id="loginForm"
        class="auth-form"
    >

        <h1>Login</h1>

        <input
            type="email"
            id="loginEmail"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="loginPassword"
            placeholder="Password"
            required
        >

        <p id="authMessage"></p>

        <button
            type="submit"
            class="btn"
        >
            Login
        </button>

        <p>
            Don't have an account?
            <a href="signup.html">
                Signup
            </a>
        </p>

    </form>

</div>

<script src="js/auth.js"></script>

</body>
</html>
