<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Property | Dream Homes</title>

    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>

    <nav class="navbar">

        <div class="logo">
            <img src="assets/images/logo.png" alt="Dream Homes Logo">
        </div>

        <div id="welcomeUser" class="welcome-user"></div>

        <ul class="nav-links">

            <li>
                <a href="index.html">Home</a>
            </li>

            <li>
                <a href="properties.html">Properties</a>
            </li>

            <li>
                <a href="contact.html">Contact</a>
            </li>

            <li id="dashboardLink">
                <a href="dashboard.html">Dashboard</a>
            </li>

            <li>
                <button id="dark-mode-btn">
                    🌙
                </button>
            </li>

            <li id="authLink">
                <a href="login.html" class="login-btn">
                    Login / Signup
                </a>
            </li>

            <li id="logoutLink" class="hidden">
                <a href="#" id="logoutBtn">
                    Logout
                </a>
            </li>

        </ul>

    </nav>

</header>

<section class="add-property">

    <h1 id="formHeading">
        Add New Property
    </h1>

    <div class="property-form-container">

        <!-- Property Form -->

        <form id="propertyForm">

            <input
                type="text"
                id="title"
                placeholder="Property Title"
                required
            >

            <select id="type">

                <option value="House">
                    House
                </option>

                <option value="Apartment">
                    Apartment
                </option>

                <option value="Villa">
                    Villa
                </option>

            </select>

            <input
                type="number"
                id="price"
                placeholder="Price"
                required
            >

            <input
                type="text"
                id="location"
                placeholder="Location"
                required
            >

            <input
                type="number"
                id="bedrooms"
                placeholder="Bedrooms"
                required
            >

            <input
                type="number"
                id="bathrooms"
                placeholder="Bathrooms"
                required
            >

            <input
                type="text"
                id="area"
                placeholder="Area (sq.ft)"
                required
            >

            <input
                type="url"
                id="image"
                placeholder="Image URL"
                required
            >

            <textarea
                id="description"
                rows="5"
                placeholder="Description"
            ></textarea>

            <input
                type="tel"
                id="phone"
                placeholder="Contact Number"
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
            >

            <button
                type="submit"
                class="btn"
                id="submitBtn"
            >
                Add Property
            </button>

        </form>

        <!-- Live Preview -->

        <div class="preview-card">

            <img
                id="previewImage"
                src="assets/images/preview.jpeg"
                alt="Preview"
            >

            <h3 id="previewTitle">
                Property Title
            </h3>

            <p id="previewLocation">
                Location
            </p>

            <p id="previewPrice">
                Price
            </p>

        </div>

    </div>

</section>

<footer>

        <div class="footer-content">

            <h3>Dream Homes</h3>

            <p>
                Helping you find your perfect home.
            </p>

            <p>
                <i class="fa-solid fa-envelope"></i>
                support@dreamhomes.com
            </p>

            <p>
                <i class="fa-solid fa-phone"></i>
                +91 9876543210
            </p>

            <div class="social-icons">

                <a href="#">
                    <i class="fa-brands fa-instagram"></i>
                </a>

                <a href="#">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>

                <a href="#">
                    <i class="fa-brands fa-linkedin-in"></i>
                </a>

                <a href="#">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>

            </div>

            <p class="copyright">
                © 2026 Dream Homes. All Rights Reserved.
            </p>

        </div>

    </footer>

<script src="js/add-property.js"></script>

</body>
</html>
