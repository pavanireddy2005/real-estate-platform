<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties | Dream Homes</title>
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">

            <div class="logo">
                <img src="assets/images/logo.png" alt="Dream Homes Logo">
            </div>

            <div id="welcomeUser" class="welcome-user"></div>

            <div class="hamburger">
                ☰
            </div>

            <ul class="nav-links">

                <li><a href="index.html">Home</a></li>

                <li><a href="properties.html">Properties</a></li>

                <li><a href="contact.html">Contact</a></li>

                <li id="dashboardLink">
                    <a href="dashboard.html">Dashboard</a>
                </li>

                <li>
                    <button id="dark-mode-btn">
                        🌙
                    </button>
                </li>

                <li id="authLink">
                    <a href="login.html" class="login-btn">
                        Login / Signup
                    </a>
                </li>

                <li id="logoutLink" class="hidden">
                    <a href="#" id="logoutBtn">
                        Logout
                    </a>
                </li>

            </ul>

        </nav>
    </header>

    <!-- Search -->
    <section class="search-section">

        <h1>Find Your Dream Property</h1>

        <input
            type="text"
            id="searchInput"
            placeholder="Search by location or property name..."
        >

    </section>

    <!-- Filters + Sort -->
    <section class="property-controls">

        <div class="filters">

            <button onclick="filterProperties('All')">
                All
            </button>

            <button onclick="filterProperties('House')">
                House
            </button>

            <button onclick="filterProperties('Apartment')">
                Apartment
            </button>

            <button onclick="filterProperties('Villa')">
                Villa
            </button>

        </div>

        <select id="sortPrice">
            <option value="">
                Sort By Price
            </option>

            <option value="low">
                Low to High
            </option>

            <option value="high">
                High to Low
            </option>
        </select>

    </section>

    <!-- Property Count -->
    <h3 id="propertyCount"></h3>

    <!-- Property Grid -->
    <section class="properties-section">

        <div
            class="property-container"
            id="propertyContainer"
        ></div>

    </section>

    <!-- Add Property -->
    <section
        class="add-property-section"
        id="addPropertySection"
    >
        <a
            href="add-property.html"
            class="btn"
        >
            + Add Property
        </a>
    </section>

    <!-- Modal -->

    <div id="propertyModal" class="modal">

        <div class="modal-content">

            <span class="close-btn">
                &times;
            </span>

            <img
                id="modalImage"
                src=""
                alt="Property"
            >

            <h2 id="modalTitle"></h2>

            <p id="modalType"></p>

            <p id="modalLocation"></p>

            <p id="modalPrice"></p>

            <p id="modalBedrooms"></p>

            <p id="modalBathrooms"></p>

            <p id="modalArea"></p>

            <p id="modalDescription"></p>

            <p id="modalPhone"></p>

            <p id="modalEmail"></p>

        </div>

    </div>

    <!-- Footer -->

    <footer>

        <div class="footer-content">

            <h3>Dream Homes</h3>

            <p>
                Helping you find your perfect home.
            </p>

            <p>
                <i class="fa-solid fa-envelope"></i>
                support@dreamhomes.com
            </p>

            <p>
                <i class="fa-solid fa-phone"></i>
                +91 9876543210
            </p>

            <div class="social-icons">

                <a href="#">
                    <i class="fa-brands fa-instagram"></i>
                </a>

                <a href="#">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>

                <a href="#">
                    <i class="fa-brands fa-linkedin-in"></i>
                </a>

                <a href="#">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>

            </div>

            <p class="copyright">
                © 2026 Dream Homes. All Rights Reserved.
            </p>

        </div>

    </footer>

    <script src="js/properties.js"></script>

</body>
</html>
