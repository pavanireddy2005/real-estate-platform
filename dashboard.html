<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Dream Homes</title>

    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>

    <nav class="navbar">

        <div class="logo">
            <img src="assets/images/logo.png" alt="Dream Homes Logo">
        </div>

        <div id="welcomeUser" class="welcome-user"></div>

        <ul class="nav-links">

            <li>
                <a href="index.html">Home</a>
            </li>

            <li>
                <a href="properties.html">Properties</a>
            </li>

            <li>
                <a href="add-property.html">
                    Add Property
                </a>
            </li>

            <li>
                <button id="dark-mode-btn">
                    🌙
                </button>
            </li>

            <li id="authLink">
                <a href="login.html">
                    Login / Signup
                </a>
            </li>

            <li id="logoutLink" class="hidden">
                <a href="#" id="logoutBtn">
                    Logout
                </a>
            </li>

        </ul>

    </nav>

</header>

<section class="dashboard">

    <h1>
        Seller Dashboard
    </h1>

    <div class="stats">

        <div class="stat-card">

            <h2 id="propertyCount">
                0
            </h2>

            <p>
                Properties
            </p>

        </div>

        <div class="stat-card">

            <h2 id="totalValue">
                ₹0
            </h2>

            <p>
                Total Value
            </p>

        </div>

    </div>

    <div
        id="dashboardProperties"
        class="dashboard-properties"
    ></div>

</section>

<footer>

        <div class="footer-content">

            <h3>Dream Homes</h3>

            <p>
                Helping you find your perfect home.
            </p>

            <p>
                <i class="fa-solid fa-envelope"></i>
                support@dreamhomes.com
            </p>

            <p>
                <i class="fa-solid fa-phone"></i>
                +91 9876543210
            </p>

            <div class="social-icons">

                <a href="#">
                    <i class="fa-brands fa-instagram"></i>
                </a>

                <a href="#">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>

                <a href="#">
                    <i class="fa-brands fa-linkedin-in"></i>
                </a>

                <a href="#">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>

            </div>

            <p class="copyright">
                © 2026 Dream Homes. All Rights Reserved.
            </p>

        </div>

    </footer>

<script src="js/dashboard.js"></script>

</body>
</html>
